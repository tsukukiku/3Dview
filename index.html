<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>GLB 3D 浏览器</title>
  <style>
    :root {
      --bg: #0f172a;
      --viewer-bg: linear-gradient(180deg, #ffffff 0%, #d7dbe2 100%);
      --panel: rgba(2, 6, 23, 0.72);
      --text: #e2e8f0;
      --accent: #22d3ee;
      --btn: rgba(15, 23, 42, 0.92);
      --btn-hover: rgba(30, 41, 59, 0.95);
      --border: rgba(148, 163, 184, 0.28);
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: var(--viewer-bg);
      color: var(--text);
      font-family: "Noto Sans SC", "Microsoft YaHei", sans-serif;
      overflow: hidden;
      touch-action: none;
    }

    #app {
      position: fixed;
      inset: 0;
    }

    #viewer {
      width: 100%;
      height: 100%;
      display: block;
    }

    .hud {
      position: fixed;
      z-index: 20;
      backdrop-filter: blur(8px);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 7px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
    }

    .top-left {
      transition: transform 220ms ease, opacity 180ms ease;
    }

    .top-left {
      top: 32px;
      left: 12px;
      padding: 5px;
      display: grid;
      gap: 5px;
      min-width: 220px;
    }

    .top-right {
      position: static;
      display: grid;
      gap: 5px;
      max-width: none;
      padding: 0;
      background: transparent;
      border: 0;
      box-shadow: none;
      backdrop-filter: none;
    }

    .bottom-status {
      left: 12px;
      bottom: 12px;
      padding: 6px 8px;
      font-size: 12px;
      max-width: calc(100% - 24px);
    }

    .menu-handle {
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      border-top-left-radius: 0;
      border-top-right-radius: 0;
      padding: 4px 8px;
      z-index: 24;
    }

    .bottom-actions {
      right: 16px;
      bottom: 16px;
      padding: 0;
      display: flex;
      gap: 6px;
      z-index: 25;
      background: transparent;
      border: 0;
      box-shadow: none;
      backdrop-filter: none;
    }

    .bottom-actions button {
      font-size: 15px;
      min-height: 34px;
      padding: 6px 10px;
    }

    .fullscreen-only {
      display: none;
    }

    .advanced-controls {
      display: flex;
    }

    body.menu-collapsed .top-left {
      transform: translateY(calc(-100% - 24px));
      opacity: 0;
      pointer-events: none;
    }

    body.viewer-fullscreen .top-left,
    body.viewer-fullscreen .menu-handle,
    body.viewer-fullscreen .bottom-status,
    body.viewer-fullscreen .side-controls,
    body.viewer-fullscreen .standard-only {
      display: none;
    }

    body.viewer-fullscreen .fullscreen-only {
      display: inline-flex;
    }

    .coords {
      position: fixed;
      top: 12px;
      left: 16px;
      z-index: 26;
      padding: 0;
      background: transparent;
      border: 0;
      box-shadow: none;
      backdrop-filter: none;
      pointer-events: none;
      font-size: 8px;
      line-height: 1.2;
      color: rgba(15, 23, 42, 0.9);
      text-shadow: 0 1px 2px rgba(255, 255, 255, 0.75);
    }

    .coords b {
      color: var(--accent);
      font-weight: 700;
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    button {
      border: 1px solid var(--border);
      background: var(--btn);
      color: var(--text);
      border-radius: 7px;
      padding: 5px 7px;
      cursor: pointer;
      font-size: 12px;
      min-height: 30px;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    button.active {
      background: var(--btn-hover);
      border-color: var(--accent);
    }

    @media (hover: hover) {
      button:hover {
        background: var(--btn-hover);
        border-color: var(--accent);
      }
    }

    .swatch {
      width: 30px;
      min-width: 30px;
      padding: 0;
      justify-content: center;
    }

    .swatch::before {
      content: "";
      width: 15px;
      height: 15px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.7);
      background: var(--swatch);
    }

    .icon {
      width: 16px;
      height: 16px;
      display: inline-block;
    }

    .file-row {
      display: flex;
      align-items: center;
      gap: 5px;
      flex-wrap: wrap;
    }

    .prompt-row {
      display: grid;
      grid-template-columns: 86px minmax(0, 1fr);
      gap: 6px;
      align-items: stretch;
    }

    .sample-uploader {
      display: grid;
      gap: 4px;
      align-content: start;
    }

    .preview-box {
      width: 86px;
      height: 54px;
      border: 1px solid var(--border);
      border-radius: 7px;
      background: rgba(15, 23, 42, 0.72);
      display: grid;
      place-items: center;
      overflow: hidden;
      color: rgba(226, 232, 240, 0.62);
      font-size: 10px;
    }

    .preview-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .passcode-input {
      width: 82px;
      border: 1px solid var(--border);
      background: rgba(15, 23, 42, 0.92);
      color: var(--text);
      border-radius: 7px;
      padding: 5px 7px;
      font-size: 12px;
      min-height: 30px;
    }

    .limit-note {
      font-size: 10px;
      opacity: 0.72;
    }

    .action-row,
    .library-row,
    .light-row {
      flex-wrap: nowrap;
    }

    .library-row label,
    .light-row label {
      flex: 0 0 auto;
    }

    .library-row select {
      width: min(58vw, 320px);
      flex: 1 1 auto;
      min-width: 0;
    }

    .library-row button {
      flex: 0 0 auto;
    }

    .light-row {
      align-items: center;
    }

    .side-controls {
      position: fixed;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 24;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      color: var(--text);
      font-size: 11px;
    }

    .side-control {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding: 0 2px;
    }

    .side-control label {
      writing-mode: vertical-rl;
      letter-spacing: 2px;
      line-height: 1;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.45);
    }

    .side-control input[type="range"] {
      width: 28px;
      height: 104px;
      writing-mode: vertical-lr;
      direction: rtl;
    }

    .light-row .swatch-group {
      display: inline-flex;
      gap: 4px;
      flex: 0 1 auto;
      min-width: 0;
    }

    .light-row label {
      font-size: 12px;
      white-space: nowrap;
    }

    input[type="range"] {
      width: 82px;
      accent-color: var(--accent);
    }

    input[type="file"] {
      width: 180px;
      color: var(--text);
      font-size: 12px;
    }

    textarea {
      width: 100%;
      min-height: 50px;
      resize: vertical;
      border: 1px solid var(--border);
      background: rgba(15, 23, 42, 0.92);
      color: var(--text);
      border-radius: 7px;
      padding: 5px 7px;
      font: inherit;
      font-size: 12px;
      line-height: 1.3;
    }

    textarea::placeholder {
      color: rgba(226, 232, 240, 0.62);
    }

    select {
      border: 1px solid var(--border);
      background: var(--btn);
      color: var(--text);
      border-radius: 7px;
      padding: 5px 7px;
      min-height: 30px;
      font-size: 12px;
    }

    .axis-button {
      width: 34px;
      min-width: 34px;
      height: 30px;
      padding: 0;
      border-radius: 50%;
      justify-content: center;
      font-weight: 700;
    }

    .hint {
      font-size: 12px;
      opacity: 0.85;
    }

    @media (max-width: 720px) {
      .top-left {
        max-width: calc(100% - 24px);
      }
      body.menu-collapsed .top-left {
        transform: translateY(calc(-100% - 24px));
      }
      .top-left {
        min-width: 0;
        width: calc(100% - 24px);
      }
      .coords {
        left: 14px;
      }
      .action-row {
        flex-wrap: wrap;
      }
      .prompt-row {
        grid-template-columns: 78px minmax(0, 1fr);
      }
      .preview-box {
        width: 78px;
        height: 50px;
      }
      .library-row select {
        width: 46vw;
      }
      .light-row {
        flex-wrap: wrap;
      }
      input[type="range"] {
        width: 96px;
      }
      .side-controls {
        right: 4px;
      }
      .side-control input[type="range"] {
        width: 26px;
        height: 86px;
      }
      input[type="file"] {
        width: 100%;
      }
      .bottom-actions {
        right: 10px;
        bottom: 10px;
      }
      .bottom-actions button {
        min-height: 34px;
        padding: 6px 10px;
      }
    }
  </style>
  <script src="./config.js"></script>
</head>
<body>
  <div id="app">
    <canvas id="viewer"></canvas>
    <button class="hud menu-handle" id="btnMenuToggle" title="显示/隐藏顶部菜单">菜单</button>
    <div class="coords" id="coords">X=<b>1.00</b> Y=<b>1.00</b> Z=<b>1.00</b></div>
    <div class="side-controls" id="sideControls">
      <div class="side-control">
        <label for="saturationSlider">饱和度</label>
        <input id="saturationSlider" type="range" min="0" max="200" value="100" />
      </div>
      <div class="side-control" id="brightnessControl">
        <label for="brightnessSlider">亮度</label>
        <input id="brightnessSlider" type="range" min="0" max="100" value="49" />
      </div>
    </div>

    <div class="hud top-left">
      <div class="prompt-row">
        <div class="sample-uploader">
          <button id="btnSampleImage" title="上传给Triple3D参考的样本照片">样本照片</button>
          <input id="sampleImageInput" type="file" accept="image/*" style="display:none" />
          <div class="preview-box" id="samplePreview">预览</div>
        </div>
        <textarea id="promptInput" placeholder="输入提示词，例如：a silver jeep wrangler rubicon, pbr texture"></textarea>
      </div>
      <div class="file-row action-row">
        <input class="passcode-input" id="passcodeInput" type="password" placeholder="口令" autocomplete="off" />
        <button id="btnGenerate" title="从后端API生成GLB并自动加载">
          <span class="icon">✦</span>生成3D
        </button>
        <button id="btnCheckJob" title="检查当前生成任务">
          <span class="icon">↻</span>进度
        </button>
        <button id="btnOpenFile" title="打开本地GLB文件">
          <span class="icon">⤴</span>打开文件
        </button>
        <input id="fileInput" type="file" accept=".glb,.gltf" style="display:none" />
      </div>
      <div class="limit-note">口令：3DVIEW。照片会自动压缩到5MB以下。每IP每天最多2次生成。</div>
      <div class="file-row library-row">
        <label for="libSelect">库内模型:</label>
        <select id="libSelect">
          <option value="">请选择</option>
          <option value="assets/Vehicle-jeep_wrangler_adventure_rubicon.glb">Vehicle-jeep_wrangler_adventure_rubicon</option>
          <option value="assets/Vehicle- redbull_rb19_oracle.glb">Vehicle- redbull_rb19_oracle</option>
          <option value="assets/Vehicle- 2011_bugatti_veyron.glb">Vehicle- 2011_bugatti_veyron</option>
          <option value="assets/Statue- sailing_ship_model.glb">Statue- sailing_ship_model</option>
          <option value="assets/Statue- napoleon.glb">Statue- napoleon</option>
          <option value="assets/Statue- masamune.glb">Statue- masamune</option>
          <option value="assets/Statue- doraemo.glb">Statue- doraemo</option>
          <option value="assets/Military- p-51d-20-na_mustang.glb">Military- p-51d-20-na_mustang</option>
          <option value="assets/Military- p-51d.glb">Military- p-51d</option>
          <option value="assets/Military- messerschmitt_bf_110.glb">Military- messerschmitt_bf_110</option>
          <option value="assets/Military- merkava_mk.2d.glb">Military- merkava_mk.2d</option>
          <option value="assets/Military- J-10s.glb">Military- J-10s</option>
          <option value="assets/Military- bf110.glb">Military- bf110</option>
          <option value="assets/Military- AH-1Z_viper.glb">Military- AH-1Z_viper</option>
          <option value="assets/Generated- BF109_tripo.glb">Generated- BF109_tripo</option>
          <option value="assets/Food- hamburger-value_meal.glb">Food- hamburger-value_meal</option>
          <option value="assets/Food- cabbage.glb">Food- cabbage</option>
        </select>
        <button id="btnLoadLib" title="加载库内模型">
          <span class="icon">◇</span>加载
        </button>
      </div>
      <div class="hint">单指旋转、双指缩放/平移（手机）；鼠标拖动旋转、滚轮缩放（PC）</div>

      <div class="top-right">
        <div class="buttons">
          <button class="axis-button" id="btnC" title="X=0，其他=1">X</button>
          <button class="axis-button" id="btnD" title="Y=0，其他=1">Y</button>
          <button class="axis-button" id="btnB" title="顶视正方向，Z=0">Z</button>
          <button id="btnToggleCoords" title="开关坐标轴、网格和当前位置">
            <span class="icon">⊕</span>坐标
          </button>
        </div>
        <div class="buttons advanced-controls" id="advancedControls">
          <button id="btnA" title="复原坐标、旋转、位移和视角">
            复原
          </button>
          <button id="btnSpinH" title="当前坐标慢速水平旋转">
            水平转
          </button>
          <button id="btnSpinV" title="当前坐标慢速垂直旋转">
            垂直转
          </button>
        </div>
        <div class="buttons light-row">
          <div class="swatch-group" aria-label="背景颜色">
            <button class="swatch active" data-bg="whiteGray" title="上白下灰渐变色" style="--swatch:linear-gradient(180deg,#ffffff,#d7dbe2)"></button>
            <button class="swatch" data-bg="grayBlue" title="上灰下浅蓝渐变色" style="--swatch:linear-gradient(180deg,#d8dde5,#bfe3ff)"></button>
            <button class="swatch" data-bg="grayYellow" title="上灰下浅黄" style="--swatch:linear-gradient(180deg,#d8dde5,#fff1a8)"></button>
            <button class="swatch" data-bg="grayGreen" title="上灰下浅绿" style="--swatch:linear-gradient(180deg,#d8dde5,#c9f3cf)"></button>
            <button class="swatch" data-bg="deepBlue" title="深蓝" style="--swatch:#0b3f7a"></button>
            <button class="swatch" data-bg="darkBlack" title="雅黑" style="--swatch:#111317"></button>
          </div>
        </div>
      </div>
    </div>
    <div class="hud bottom-status" id="status">准备就绪</div>
    <div class="hud bottom-actions">
      <button class="standard-only" id="btnFullscreen" title="进入全画面">
        <span class="icon">⛶</span>全画面
      </button>
      <button id="btnSave" title="保存当前画面为PNG">
        <span class="icon">▣</span>保存
      </button>
      <button class="fullscreen-only" id="btnReturn" title="退出全画面">
        <span class="icon">↩</span>返回
      </button>
    </div>
  </div>

  <script type="module">
    import * as THREE from './vendor/three/build/three.module.js';
    import { OrbitControls } from './vendor/three/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from './vendor/three/examples/jsm/loaders/GLTFLoader.js';
    import { DRACOLoader } from './vendor/three/examples/jsm/loaders/DRACOLoader.js';
    import { RoomEnvironment } from './vendor/three/examples/jsm/environments/RoomEnvironment.js';
    import { MeshoptDecoder } from './vendor/three/examples/jsm/libs/meshopt_decoder.module.js';

    const canvas = document.getElementById('viewer');
    const coordsEl = document.getElementById('coords');
    const statusEl = document.getElementById('status');
    const btnMenuToggle = document.getElementById('btnMenuToggle');
    const promptInput = document.getElementById('promptInput');
    const passcodeInput = document.getElementById('passcodeInput');
    const btnSampleImage = document.getElementById('btnSampleImage');
    const sampleImageInput = document.getElementById('sampleImageInput');
    const samplePreview = document.getElementById('samplePreview');
    const btnGenerate = document.getElementById('btnGenerate');
    const btnCheckJob = document.getElementById('btnCheckJob');
    const fileInput = document.getElementById('fileInput');
    const btnOpenFile = document.getElementById('btnOpenFile');
    const libSelect = document.getElementById('libSelect');
    const btnLoadLib = document.getElementById('btnLoadLib');
    const btnFullscreen = document.getElementById('btnFullscreen');
    const btnSave = document.getElementById('btnSave');
    const btnReturn = document.getElementById('btnReturn');

    const btnA = document.getElementById('btnA');
    const btnB = document.getElementById('btnB');
    const btnC = document.getElementById('btnC');
    const btnD = document.getElementById('btnD');
    const btnSpinH = document.getElementById('btnSpinH');
    const btnSpinV = document.getElementById('btnSpinV');
    const btnToggleCoords = document.getElementById('btnToggleCoords');
    const brightnessSlider = document.getElementById('brightnessSlider');
    const brightnessControl = document.getElementById('brightnessControl');
    const sideControls = document.getElementById('sideControls');
    const saturationSlider = document.getElementById('saturationSlider');
    const bgButtons = document.querySelectorAll('[data-bg]');
    const API_BASE_URL = (window.APP_CONFIG && window.APP_CONFIG.API_BASE_URL || '').replace(/\/$/, '');

    const scene = new THREE.Scene();
    scene.background = null;

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.01, 1000);
    camera.position.set(3.2, 2.6, 4.0);
    const initialCameraPosition = camera.position.clone();

    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true, preserveDrawingBuffer: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.35;

    const pmremGenerator = new THREE.PMREMGenerator(renderer);
    const roomEnvironment = new RoomEnvironment();
    scene.environment = pmremGenerator.fromScene(roomEnvironment, 0.04).texture;

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.target.set(1, 1, 1);

    const hemi = new THREE.HemisphereLight(0xffffff, 0xdbeafe, 2.4);
    scene.add(hemi);

    const dir = new THREE.DirectionalLight(0xffffff, 2.2);
    dir.position.set(6, 8, 8);
    scene.add(dir);

    const fill = new THREE.DirectionalLight(0xffffff, 1.6);
    fill.position.set(-7, 5, -4);
    scene.add(fill);

    const front = new THREE.DirectionalLight(0xffffff, 1.3);
    front.position.set(0, 3, 9);
    scene.add(front);

    const lightDefaults = {
      exposure: 1.35,
      hemi: hemi.intensity,
      dir: dir.intensity,
      fill: fill.intensity,
      front: front.intensity,
      envMapIntensity: 1.8
    };

    const grid = new THREE.GridHelper(20, 20, 0x94a3b8, 0x334155);
    grid.position.set(0, 0, 0);
    scene.add(grid);

    const axes = new THREE.AxesHelper(3);
    scene.add(axes);

    const pivot = new THREE.Object3D();
    pivot.position.set(1, 1, 1);
    scene.add(pivot);

    let modelRoot = null;
    let spinHorizontal = false;
    let spinVertical = false;
    let coordsVisible = true;
    let menuCollapsed = false;
    let currentBackground = 'whiteGray';
    let currentSaturation = 100;
    let sampleImagePayload = null;
    let currentJobId = null;
    let jobPollTimer = null;
    let menuCollapseTimer = null;

    const backgrounds = {
      whiteGray: 'linear-gradient(180deg, #ffffff 0%, #d7dbe2 100%)',
      grayBlue: 'linear-gradient(180deg, #d8dde5 0%, #bfe3ff 100%)',
      grayYellow: 'linear-gradient(180deg, #d8dde5 0%, #fff1a8 100%)',
      grayGreen: 'linear-gradient(180deg, #d8dde5 0%, #c9f3cf 100%)',
      deepBlue: '#0b3f7a',
      darkBlack: '#111317'
    };

    const saveBackgrounds = {
      whiteGray: ['#ffffff', '#d7dbe2'],
      grayBlue: ['#d8dde5', '#bfe3ff'],
      grayYellow: ['#d8dde5', '#fff1a8'],
      grayGreen: ['#d8dde5', '#c9f3cf'],
      deepBlue: ['#0b3f7a', '#0b3f7a'],
      darkBlack: ['#111317', '#111317']
    };

    function updateCoordinateDisplay(position = pivot.position) {
      const p = position.clone ? position.clone() : new THREE.Vector3(position.x, position.y, position.z);
      const viewOffset = camera.position.clone().sub(initialCameraPosition).multiplyScalar(0.1);
      p.add(viewOffset);
      p.x += pivot.rotation.x;
      p.y += pivot.rotation.y;
      p.z += pivot.rotation.z;
      coordsEl.innerHTML = `X=<b>${p.x.toFixed(2)}</b> Y=<b>${p.y.toFixed(2)}</b> Z=<b>${p.z.toFixed(2)}</b>`;
    }

    function stopAllSpin() {
      spinHorizontal = false;
      spinVertical = false;
      btnSpinH.classList.remove('active');
      btnSpinV.classList.remove('active');
    }

    function setPivotPosition(x, y, z) {
      pivot.position.set(x, y, z);
      controls.target.copy(pivot.position);
      updateCoordinateDisplay(pivot.position);
    }

    function resetPose() {
      clearTimeout(menuCollapseTimer);
      stopAllSpin();
      btnA.classList.add('active');
      saturationSlider.value = '100';
      applySaturation(saturationSlider.value);
      setPivotPosition(1, 1, 1);
      pivot.rotation.set(0, 0, 0);
      if (modelRoot) {
        modelRoot.rotation.set(0, 0, 0);
      }
      camera.position.set(3.2, 2.6, 4.0);
      controls.target.copy(pivot.position);
      camera.lookAt(pivot.position);
      controls.update();
      updateCoordinateDisplay(pivot.position);
      setTimeout(() => btnA.classList.remove('active'), 180);
    }

    function setTopViewPositive() {
      setPivotPosition(1, 1, 0);
      camera.position.set(pivot.position.x, pivot.position.y + 4, pivot.position.z);
      camera.lookAt(pivot.position);
      controls.update();
      updateCoordinateDisplay(pivot.position);
    }

    function setXZero() {
      setPivotPosition(0, 1, 1);
      controls.update();
      updateCoordinateDisplay(pivot.position);
    }

    function setYZero() {
      setPivotPosition(1, 0, 1);
      controls.update();
      updateCoordinateDisplay(pivot.position);
    }

    function clearModel() {
      if (!modelRoot) return;
      pivot.remove(modelRoot);
      modelRoot.traverse((obj) => {
        if (obj.geometry) obj.geometry.dispose();
        if (obj.material) {
          if (Array.isArray(obj.material)) obj.material.forEach((m) => m.dispose());
          else obj.material.dispose();
        }
      });
      modelRoot = null;
    }

    function centerModelOnPivot(object3D) {
      const box = new THREE.Box3().setFromObject(object3D);
      if (box.isEmpty()) return new THREE.Vector3(1, 1, 1);
      const center = box.getCenter(new THREE.Vector3());
      object3D.position.sub(center.sub(pivot.position));
      const recenteredBox = new THREE.Box3().setFromObject(object3D);
      return recenteredBox.getSize(new THREE.Vector3());
    }

    function fitCameraToObject(object3D) {
      const size = centerModelOnPivot(object3D);

      const maxSize = Math.max(size.x, size.y, size.z, 0.2);
      const distance = maxSize * 2.2;
      camera.position.set(pivot.position.x + distance, pivot.position.y + distance * 0.8, pivot.position.z + distance);
      camera.near = maxSize / 100;
      camera.far = maxSize * 100;
      camera.updateProjectionMatrix();
      controls.target.copy(pivot.position);
      camera.lookAt(pivot.position);
      controls.update();
    }

    function prepareModelMaterials(object3D) {
      object3D.traverse((obj) => {
        if (!obj.isMesh) return;
        const materials = Array.isArray(obj.material) ? obj.material : [obj.material];
        materials.forEach((material) => {
          if (!material) return;
          material.envMapIntensity = lightDefaults.envMapIntensity;
          material.needsUpdate = true;
        });
      });
      applyBrightness(brightnessSlider.value);
    }

    const loader = new GLTFLoader();
    const dracoLoader = new DRACOLoader();
    dracoLoader.setDecoderPath('./vendor/three/examples/jsm/libs/draco/');
    loader.setDRACOLoader(dracoLoader);
    loader.setMeshoptDecoder(MeshoptDecoder);

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function setGenerating(isGenerating) {
      btnGenerate.disabled = isGenerating;
      btnGenerate.classList.toggle('active', isGenerating);
    }

    function readFileAsDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result || ''));
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    function loadImage(dataUrl) {
      return new Promise((resolve, reject) => {
        const image = new Image();
        image.onload = () => resolve(image);
        image.onerror = reject;
        image.src = dataUrl;
      });
    }

    function canvasToBlob(canvas, type, quality) {
      return new Promise((resolve) => canvas.toBlob(resolve, type, quality));
    }

    async function compressImageForUpload(file) {
      const maxBytes = 5 * 1024 * 1024;
      const sourceDataUrl = await readFileAsDataUrl(file);
      const image = await loadImage(sourceDataUrl);
      let maxSide = Math.max(image.width, image.height);
      let quality = 0.86;
      let blob = null;

      for (let attempt = 0; attempt < 9; attempt += 1) {
        const scale = Math.min(1, maxSide / Math.max(image.width, image.height));
        const width = Math.max(1, Math.round(image.width * scale));
        const height = Math.max(1, Math.round(image.height * scale));
        const canvas2d = document.createElement('canvas');
        canvas2d.width = width;
        canvas2d.height = height;
        const ctx = canvas2d.getContext('2d');
        ctx.drawImage(image, 0, 0, width, height);
        blob = await canvasToBlob(canvas2d, 'image/jpeg', quality);
        if (blob && blob.size <= maxBytes) break;
        if (quality > 0.58) quality -= 0.12;
        else maxSide = Math.round(maxSide * 0.78);
      }

      if (!blob || blob.size > maxBytes) {
        throw new Error('照片压缩后仍超过5MB，请换一张较小的照片');
      }

      const dataUrl = await readFileAsDataUrl(blob);
      return {
        dataUrl,
        mimeType: 'image/jpeg',
        bytes: blob.size,
        originalName: file.name
      };
    }

    function setSamplePreview(payload) {
      if (!payload) {
        samplePreview.textContent = '预览';
        return;
      }
      samplePreview.innerHTML = `<img src="${payload.dataUrl}" alt="样本照片预览">`;
    }

    function setMenuCollapsed(collapsed) {
      menuCollapsed = collapsed;
      document.body.classList.toggle('menu-collapsed', collapsed);
      btnMenuToggle.textContent = collapsed ? '菜单' : '收起';
    }

    function scheduleMenuCollapse(delayMs = 5000) {
      clearTimeout(menuCollapseTimer);
      menuCollapseTimer = setTimeout(() => {
        setMenuCollapsed(true);
      }, delayMs);
    }

    function applyBackground(name) {
      currentBackground = name;
      document.documentElement.style.setProperty('--viewer-bg', backgrounds[name] || backgrounds.whiteGray);
      bgButtons.forEach((button) => button.classList.toggle('active', button.dataset.bg === name));
    }

    function applyBrightness(value) {
      const minScale = 0.225;
      const maxScale = 1.8;
      const scale = minScale + (Number(value) / 100) * (maxScale - minScale);
      renderer.toneMappingExposure = lightDefaults.exposure * scale;
      hemi.intensity = lightDefaults.hemi * scale;
      dir.intensity = lightDefaults.dir * scale;
      fill.intensity = lightDefaults.fill * scale;
      front.intensity = lightDefaults.front * scale;
      if (modelRoot) {
        modelRoot.traverse((obj) => {
          if (!obj.isMesh || !obj.material) return;
          const materials = Array.isArray(obj.material) ? obj.material : [obj.material];
          materials.forEach((material) => {
            if (!material) return;
            material.envMapIntensity = lightDefaults.envMapIntensity * scale;
            material.needsUpdate = true;
          });
        });
      }
    }

    function applySaturation(value) {
      currentSaturation = Number(value);
      canvas.style.filter = `saturate(${currentSaturation}%)`;
    }

    function setCoordsVisible(visible) {
      coordsVisible = visible;
      grid.visible = visible;
      axes.visible = visible;
      coordsEl.style.display = visible ? '' : 'none';
      btnToggleCoords.classList.toggle('active', visible);
    }

    function updateRendererSize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    async function enterViewerFullscreen() {
      document.body.classList.add('viewer-fullscreen');
      if (!document.fullscreenElement && document.documentElement.requestFullscreen) {
        await document.documentElement.requestFullscreen().catch(() => {});
      }
      updateRendererSize();
    }

    async function exitViewerFullscreen() {
      document.body.classList.remove('viewer-fullscreen');
      setMenuCollapsed(false);
      if (document.fullscreenElement && document.exitFullscreen) {
        await document.exitFullscreen().catch(() => {});
      }
      updateRendererSize();
    }

    function saveCurrentFrame() {
      const hiddenForSave = [coordsEl, statusEl, btnMenuToggle, sideControls, document.querySelector('.top-left'), document.querySelector('.bottom-actions')];
      const previousDisplays = hiddenForSave.map((element) => element ? element.style.display : null);
      hiddenForSave.forEach((element) => {
        if (element) element.style.display = 'none';
      });
      controls.update();
      renderer.render(scene, camera);
      const source = renderer.domElement;
      const output = document.createElement('canvas');
      output.width = source.width;
      output.height = source.height;
      const ctx = output.getContext('2d');
      const colors = saveBackgrounds[currentBackground] || saveBackgrounds.whiteGray;
      const gradient = ctx.createLinearGradient(0, 0, output.width, output.height);
      colors.forEach((color, index) => {
        gradient.addColorStop(colors.length === 1 ? 0 : index / (colors.length - 1), color);
      });
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, output.width, output.height);
      ctx.filter = `saturate(${currentSaturation}%)`;
      ctx.drawImage(source, 0, 0, output.width, output.height);
      ctx.filter = 'none';
      const link = document.createElement('a');
      const stamp = new Date().toISOString().replace(/[:.]/g, '-');
      link.download = `glb-view-${stamp}.png`;
      link.href = output.toDataURL('image/png');
      link.click();
      hiddenForSave.forEach((element, index) => {
        if (element) element.style.display = previousDisplays[index];
      });
    }

    function apiUrl(path) {
      return `${API_BASE_URL}${path}`;
    }

    function modelUrl(path) {
      if (!path) return path;
      if (/^https?:\/\//i.test(path)) return path;
      return `${API_BASE_URL}${path}`;
    }

    async function requestJson(url, options = {}) {
      const response = await fetch(apiUrl(url), {
        headers: { 'Content-Type': 'application/json' },
        ...options
      });
      const data = await response.json();
      if (!response.ok) {
        throw new Error(data.error || `HTTP ${response.status}`);
      }
      return data;
    }

    async function checkGenerationJob(showIdleMessage = false) {
      if (!currentJobId) {
        if (showIdleMessage) setStatus('还没有生成任务');
        return;
      }

      const job = await requestJson(`/api/jobs/${currentJobId}`);
      setStatus(`生成进度: ${job.status} ${job.progress || 0}%`);

      if (job.status === 'FINISHED' && job.modelUrl) {
        clearInterval(jobPollTimer);
        jobPollTimer = null;
        setGenerating(false);
        setStatus('生成完成，正在加载GLB...');
        loadModelFromUrl(modelUrl(job.modelUrl), false);
        return;
      }

      if (job.status === 'FAILED') {
        clearInterval(jobPollTimer);
        jobPollTimer = null;
        setGenerating(false);
        setStatus(`生成失败: ${job.error || '未知错误'}`);
      }
    }

    async function startGeneration() {
      const prompt = promptInput.value.trim();
      const passcode = passcodeInput.value.trim();
      if (!prompt) {
        alert('请输入生成提示词');
        return;
      }
      if (passcode !== '3DVIEW') {
        alert('请输入正确口令：3DVIEW');
        return;
      }
      if (!sampleImagePayload) {
        alert('请先上传样本照片');
        return;
      }

      try {
        setGenerating(true);
        setMenuCollapsed(false);
        setStatus('正在提交生成任务...');
        const job = await requestJson('/api/generate', {
          method: 'POST',
          body: JSON.stringify({
            prompt,
            passcode,
            image: sampleImagePayload
          })
        });
        currentJobId = job.id;
        setStatus(`任务已提交: ${job.id}`);

        clearInterval(jobPollTimer);
        jobPollTimer = setInterval(() => {
          checkGenerationJob(false).catch((error) => {
            clearInterval(jobPollTimer);
            jobPollTimer = null;
            setGenerating(false);
            setStatus(`进度检查失败: ${error.message}`);
          });
        }, 1200);
        await checkGenerationJob(false);
      } catch (error) {
        setGenerating(false);
        setStatus(`提交失败: ${error.message}`);
      }
    }

    if (location.protocol === 'file:') {
      alert('你正在以本地文件方式打开页面，库内模型按钮会被浏览器限制。请改用 http://127.0.0.1:8080 打开。');
    }

    function loadModelFromUrl(url, revokeAfterLoad = false) {
      clearTimeout(menuCollapseTimer);
      setMenuCollapsed(false);
      setStatus('正在加载模型...');
      loader.load(url, (gltf) => {
        clearModel();
        const holder = new THREE.Group();
        holder.name = 'CenteredModelHolder';
        holder.add(gltf.scene);
        modelRoot = holder;
        prepareModelMaterials(gltf.scene);
        pivot.add(modelRoot);
        fitCameraToObject(modelRoot);
        setStatus('模型加载完成');
        scheduleMenuCollapse(5000);
        if (revokeAfterLoad) URL.revokeObjectURL(url);
      }, (event) => {
        if (!event.total) return;
        const percent = Math.round((event.loaded / event.total) * 100);
        setStatus(`正在加载模型... ${percent}%`);
      }, (err) => {
        const msg = (err && err.message) ? err.message : '未知错误';
        setStatus(`加载失败: ${msg}`);
        alert(`GLB 加载失败\\n${msg}\\n\\n请检查网络是否允许加载解码器，或尝试切换模型。`);
        console.error(err);
        if (revokeAfterLoad) URL.revokeObjectURL(url);
      });
    }

    btnOpenFile.addEventListener('click', () => {
      fileInput.click();
    });

    btnSampleImage.addEventListener('click', () => {
      sampleImageInput.click();
    });

    btnGenerate.addEventListener('click', startGeneration);

    btnCheckJob.addEventListener('click', () => {
      checkGenerationJob(true).catch((error) => setStatus(`进度检查失败: ${error.message}`));
    });

    fileInput.addEventListener('change', (e) => {
      const file = e.target.files?.[0];
      if (!file) return;

      const url = URL.createObjectURL(file);
      loadModelFromUrl(url, true);
    });

    sampleImageInput.addEventListener('change', async (e) => {
      const file = e.target.files?.[0];
      if (!file) return;
      try {
        setStatus('正在压缩样本照片...');
        sampleImagePayload = await compressImageForUpload(file);
        setSamplePreview(sampleImagePayload);
        setStatus(`样本照片已准备 ${Math.round(sampleImagePayload.bytes / 1024)}KB`);
      } catch (error) {
        sampleImagePayload = null;
        setSamplePreview(null);
        setStatus(`照片处理失败: ${error.message}`);
        alert(error.message);
      }
    });

    btnLoadLib.addEventListener('click', () => {
      const value = libSelect.value;
      if (!value) {
        alert('请先选择库内模型');
        return;
      }
      loadModelFromUrl(value, false);
    });

    libSelect.addEventListener('change', () => {
      const value = libSelect.value;
      if (value) loadModelFromUrl(value, false);
    });

    btnA.addEventListener('click', resetPose);
    btnB.addEventListener('click', setTopViewPositive);
    btnC.addEventListener('click', setXZero);
    btnD.addEventListener('click', setYZero);

    btnSpinH.addEventListener('click', () => {
      spinHorizontal = !spinHorizontal;
      btnSpinH.classList.toggle('active', spinHorizontal);
    });

    btnSpinV.addEventListener('click', () => {
      spinVertical = !spinVertical;
      btnSpinV.classList.toggle('active', spinVertical);
    });

    btnToggleCoords.addEventListener('click', () => {
      setCoordsVisible(!coordsVisible);
    });

    btnMenuToggle.addEventListener('click', () => {
      setMenuCollapsed(!menuCollapsed);
    });

    btnFullscreen.addEventListener('click', enterViewerFullscreen);
    btnReturn.addEventListener('click', exitViewerFullscreen);
    btnSave.addEventListener('click', saveCurrentFrame);

    document.addEventListener('fullscreenchange', () => {
      if (!document.fullscreenElement) {
        document.body.classList.remove('viewer-fullscreen');
        setMenuCollapsed(false);
        updateRendererSize();
      }
    });

    bgButtons.forEach((button) => {
      button.addEventListener('click', () => applyBackground(button.dataset.bg));
    });

    brightnessSlider.addEventListener('input', () => applyBrightness(brightnessSlider.value));
    saturationSlider.addEventListener('input', () => applySaturation(saturationSlider.value));

    window.addEventListener('resize', updateRendererSize);

    const clock = new THREE.Clock();

    function animate() {
      const dt = clock.getDelta();

      if (spinHorizontal) {
        pivot.rotation.y += dt * 0.4;
      }
      if (spinVertical) {
        pivot.rotation.x += dt * 0.4;
      }

      controls.update();
      updateCoordinateDisplay(controls.target);
      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }

    resetPose();
    applyBackground('whiteGray');
    applyBrightness(brightnessSlider.value);
    applySaturation(saturationSlider.value);
    setCoordsVisible(true);
    setMenuCollapsed(false);
    updateCoordinateDisplay();
    animate();
  </script>
</body>
</html>
